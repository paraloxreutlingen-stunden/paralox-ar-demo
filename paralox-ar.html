<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="UTF-8" />
  <title>Paralox AR</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }

    #start-screen {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: #111;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99999; color: #fff;
    }
    .logo-text { font-size: 2.2rem; font-weight: 900; letter-spacing: 0.3em; color: #C8D400; margin-bottom: 8px; }
    .sub { font-size: 0.75rem; letter-spacing: 0.2em; color: #666; text-transform: uppercase; margin-bottom: 50px; }
    #start-btn {
      background: #C8D400; color: #111; border: none;
      padding: 18px 44px; font-size: 1rem; font-weight: 900;
      letter-spacing: 0.15em; text-transform: uppercase;
      border-radius: 4px; cursor: pointer;
    }

    #loading-screen {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: #111;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9998; color: #fff;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #333; border-top: 3px solid #C8D400;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 30px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      position: fixed; bottom: 80px; left: 20px; right: 20px;
      background: rgba(255,60,60,0.9); color: #fff;
      padding: 12px 16px; border-radius: 8px;
      font-size: 0.85rem; z-index: 9999;
      display: none; text-align: center;
    }

    #instructions {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 12px 24px; border-radius: 30px;
      font-size: 0.85rem; letter-spacing: 0.05em;
      border: 1px solid rgba(200,212,0,0.4);
      z-index: 100; white-space: nowrap; pointer-events: none;
      display: none;
    }
    #instructions span { color: #C8D400; font-weight: bold; }

    #target-found {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(200,212,0,0.15); color: #C8D400;
      padding: 8px 20px; border-radius: 20px;
      font-size: 0.8rem; letter-spacing: 0.1em;
      border: 1px solid rgba(200,212,0,0.5);
      z-index: 100; display: none; text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <div class="logo-text">PARALOX</div>
    <div class="sub">Escape Games und mehr</div>
    <button id="start-btn" onclick="startAR()">AR STARTEN</button>
  </div>

  <div id="loading-screen">
    <div class="logo-text">PARALOX</div>
    <div class="sub">Kamera wird geladen...</div>
    <div class="spinner"></div>
  </div>

  <div id="error-msg"></div>
  <div id="target-found">Logo erkannt</div>
  <div id="instructions">Kamera auf das <span>Paralox-Logo</span> richten</div>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <a-scene id="ar-scene"
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    style="display:none;"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <a-torus
        position="0 0 0" radius="0.25" radius-tubular="0.008"
        color="#C8D400" opacity="0.6" rotation="-90 0 0"
        animation="property: rotation; from: -90 0 0; to: -90 0 360; dur: 4000; easing: linear; loop: true;">
      </a-torus>

      <a-entity
        geometry="primitive: cone; radiusBottom: 0.18; radiusTop: 0; height: 0.28; segmentsRadial: 3;"
        material="color: #C8D400; metalness: 0.3; roughness: 0.4; emissive: #6a7000; emissiveIntensity: 0.3"
        position="0 0.14 0"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 5000; easing: linear; loop: true"
        animation__float="property: position; from: 0 0.12 0; to: 0 0.2 0; dur: 2000; easing: easeInOutSine; loop: true; dir: alternate">
      </a-entity>

      <a-entity
        geometry="primitive: cone; radiusBottom: 0.08; radiusTop: 0; height: 0.12; segmentsRadial: 3;"
        material="color: #ffffff; metalness: 0.5; roughness: 0.3;"
        position="0 0.38 0"
        animation="property: rotation; from: 0 0 0; to: 0 -360 0; dur: 3500; easing: linear; loop: true"
        animation__float="property: position; from: 0 0.35 0; to: 0 0.43 0; dur: 2000; easing: easeInOutSine; loop: true; dir: alternate; delay: 300">
      </a-entity>

      <a-torus
        position="0 0.01 0" radius="0.35" radius-tubular="0.005"
        color="#ffffff" opacity="0.2" rotation="-90 0 0"
        animation="property: rotation; from: -90 0 0; to: -90 0 -360; dur: 6000; easing: linear; loop: true;">
      </a-torus>

      <a-light type="point" color="#C8D400" intensity="1.5" position="0 0.5 0.2" distance="2"></a-light>

    </a-entity>
  </a-scene>

  <script>
    function startAR() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(function(stream) {
          stream.getTracks().forEach(t => t.stop());

          document.getElementById('start-screen').style.display = 'none';
          document.getElementById('loading-screen').style.display = 'flex';

          const scene = document.getElementById('ar-scene');
          scene.style.display = 'block';

          scene.addEventListener('loaded', () => {
            const mindarSystem = scene.systems['mindar-image-system'];
            if (mindarSystem) mindarSystem.start();
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('instructions').style.display = 'block';

            const target = document.querySelector('[mindar-image-target]');
            if (target) {
              target.addEventListener('targetFound', () => {
                document.getElementById('target-found').style.display = 'block';
                document.getElementById('instructions').style.opacity = '0';
              });
              target.addEventListener('targetLost', () => {
                document.getElementById('target-found').style.display = 'none';
                document.getElementById('instructions').style.opacity = '1';
              });
            }
          });
        })
        .catch(function(err) {
          const errEl = document.getElementById('error-msg');
          errEl.style.display = 'block';
          errEl.textContent = 'Kamera-Zugriff nicht erlaubt. Bitte in den Browser-Einstellungen die Kamera freigeben.';
        });
    }
  </script>

</body>
</html>
