<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="UTF-8" />
  <title>Paralox AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #hint {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 12px 24px; border-radius: 30px; font-size: 0.9rem;
      border: 1px solid rgba(200,212,0,0.5);
      z-index: 999; white-space: nowrap; pointer-events: none;
    }
    #hint b { color: #C8D400; }
    #found {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      background: #C8D400; color: #111;
      padding: 10px 24px; border-radius: 20px; font-size: 0.9rem; font-weight: bold;
      z-index: 999; display: none;
    }
  </style>
</head>
<body>

  <div id="hint">Kamera auf das <b>Paralox-Logo</b> richten</div>
  <div id="found">Logo erkannt!</div>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-box color="#C8D400" position="0 0 0" scale="0.3 0.3 0.3"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 3000; easing: linear; loop: true">
      </a-box>
    </a-entity>

  </a-scene>

  <script>
    var target = document.querySelector('[mindar-image-target]');
    target.addEventListener('targetFound', function() {
      document.getElementById('found').style.display = 'block';
      document.getElementById('hint').style.display = 'none';
    });
    target.addEventListener('targetLost', function() {
      document.getElementById('found').style.display = 'none';
      document.getElementById('hint').style.display = 'block';
    });
  </script>

</body>
</html>
